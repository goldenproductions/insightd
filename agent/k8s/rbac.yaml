---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: insightd-agent
  namespace: insightd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: insightd-agent
rules:
  # List pods on this node, read pod logs
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Read node info (used to verify connection at startup)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Access kubelet metrics endpoint
  - apiGroups: [""]
    resources: ["nodes/metrics", "nodes/stats", "nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: insightd-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: insightd-agent
subjects:
  - kind: ServiceAccount
    name: insightd-agent
    namespace: insightd
