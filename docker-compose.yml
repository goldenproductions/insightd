# Standalone mode — single container, backwards compatible
# Use this if you only have one host and don't need MQTT
services:
  insightd:
    build:
      context: .
      dockerfile: hub/Dockerfile
    image: insightd-hub:latest
    container_name: insightd
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
      - insightd-data:/data
    env_file:
      - .env

volumes:
  insightd-data:
