name: Docker Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (hub)
        id: meta-hub
        uses: docker/metadata-action@v5
        with:
          images: andreas404/insightd-hub
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Docker meta (agent)
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: andreas404/insightd-agent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: hub/Dockerfile
          push: true
          tags: ${{ steps.meta-hub.outputs.tags }}
          labels: ${{ steps.meta-hub.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            INSIGHTD_VERSION=${{ steps.meta-hub.outputs.version }}

      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent/Dockerfile
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            INSIGHTD_VERSION=${{ steps.meta-agent.outputs.version }}
